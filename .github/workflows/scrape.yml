# .github/workflows/scrape.yml
name: 'Daily Palantir Scraper'

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 7:00 AM UTC
  workflow_dispatch:

jobs:
  scrape:
    name: 'Scrape & Ingest Palantir News'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Palantir scraper
        env:
          SITE_URL:       ${{ secrets.SITE_URL }}
          SCRAPER_TOKEN:  ${{ secrets.SCRAPER_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWSAPI_KEY:    ${{ secrets.NEWSAPI_KEY }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/scrape_palantir.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "Scraper failed — check logs above."
          echo "Common issues:"
          echo "  - SCRAPER_TOKEN not set in GitHub Secrets"
          echo "  - SITE_URL incorrect"
          echo "  - GEMINI_API_KEY expired"
