# .github/workflows/scrape.yml
# ─────────────────────────────────────────────────────────────────────────────
# PalantirLearning — Daily Palantir News Scraper
# Runs daily at 7:00 AM UTC via cron schedule.
# Can also be triggered manually via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────

name: 'Daily Palantir Scraper'

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 7:00 AM UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

jobs:
  scrape:
    name: 'Scrape & Ingest Palantir News'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install \
            feedparser \
            requests \
            google-generativeai \
            python-dateutil

      - name: Run Palantir scraper
        env:
          SITE_URL:       ${{ secrets.SITE_URL }}
          SCRAPER_TOKEN:  ${{ secrets.SCRAPER_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWSAPI_KEY:    ${{ secrets.NEWSAPI_KEY }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/scrape_palantir.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "Scraper failed. Check logs above."
          echo "Common issues:"
          echo "  - SCRAPER_TOKEN not set in GitHub Secrets"
          echo "  - SITE_URL incorrect"
          echo "  - GEMINI_API_KEY expired"
